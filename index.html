<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Designator Codes Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 3D Flip Card Styles */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        
        /* Disable text selection so double tapping doesn't highlight text */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <header class="bg-red-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-plane-departure text-2xl"></i>
                <h1 class="text-xl sm:text-2xl font-bold tracking-tight">Designator Codes Training</h1>
            </div>
            
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <select id="categoryFilter" onchange="filterCards()" class="w-full sm:w-72 bg-white text-slate-800 border-none rounded-lg py-2 px-4 shadow-sm focus:ring-2 focus:ring-red-300 outline-none font-medium">
                    <option value="All">All Categories</option>
                    <option value="Canada">Canada</option>
                    <option value="United States">United States</option>
                    <option value="International">International</option>
                    <option value="Additional Codes (YUL/YHZ East Station)">Additional Codes (YUL/YHZ+)</option>
                    <option value="Airline Codes">Airline Codes</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div class="text-slate-500 font-medium" id="cardCount">
                Loading cards...
            </div>
            <div class="flex gap-3 w-full sm:w-auto">
                <button onclick="shuffleCards()" class="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-shuffle"></i> Shuffle
                </button>
                <button onclick="flipAll()" class="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-layer-group"></i> Flip All
                </button>
            </div>
        </div>

        <div id="flashcardsContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            </div>

    </main>

        let currentCards = [...flashcardData];
        let isAllFlipped = false;

        // Render cards to the DOM
        function renderCards() {
            const container = document.getElementById('flashcardsContainer');
            container.innerHTML = ''; // Clear container

            currentCards.forEach((card) => {
                const cardHTML = `
                    <div class="h-40 perspective-1000 cursor-pointer no-select group" onclick="toggleFlip(this)">
                        <div class="card-inner relative w-full h-full transform-style-3d shadow-md hover:shadow-xl rounded-xl transition-shadow ${isAllFlipped ? 'rotate-y-180' : ''}">
                            
                            <div class="absolute w-full h-full backface-hidden bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center p-4 text-center">
                                <span class="text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-2">${card.category}</span>
                                <h3 class="text-lg font-bold text-slate-800 leading-tight">${card.front}</h3>
                                <div class="absolute bottom-2 right-3 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i class="fa-solid fa-rotate text-xs"></i>
                                </div>
                            </div>

                            <div class="absolute w-full h-full backface-hidden bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-center p-4 rotate-y-180">
                                <h2 class="text-4xl font-black tracking-widest text-white">${card.back}</h2>
                                <div class="absolute bottom-2 left-3 text-slate-500">
                                    <i class="fa-solid fa-rotate text-xs"></i>
                                </div>
                            </div>

                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            // Update Count
            document.getElementById('cardCount').innerText = `Showing ${currentCards.length} cards`;
        }

        // Toggle individual flip
        function toggleFlip(element) {
            const inner = element.querySelector('.card-inner');
            inner.classList.toggle('rotate-y-180');
        }

        // Toggle all cards
        function flipAll() {
            isAllFlipped = !isAllFlipped;
            const inners = document.querySelectorAll('.card-inner');
            inners.forEach(inner => {
                if (isAllFlipped) {
                    inner.classList.add('rotate-y-180');
                } else {
                    inner.classList.remove('rotate-y-180');
                }
            });
        }

        // Filter functionality
        function filterCards() {
            const filterValue = document.getElementById('categoryFilter').value;
            isAllFlipped = false; // Reset flip state
            
            if (filterValue === 'All') {
                currentCards = [...flashcardData];
            } else {
                currentCards = flashcardData.filter(card => card.category === filterValue);
            }
            renderCards();
        }

        // Shuffle Array (Fisher-Yates)
        function shuffleCards() {
            isAllFlipped = false;
            for (let i = currentCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
            }
            renderCards();
        }

        // Initial render
        window.onload = renderCards;
    </script>
</body>
</html>
