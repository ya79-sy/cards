<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'>
<title>Canada Codes Flashcards</title>
<style>
:root{--accent:#dc2626;--muted:#64748b}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#f8fafc,#e2e8f0);color:#0f172a}
.wrap{max-width:900px;margin:0 auto;padding:14px;padding-bottom:96px} .top{position:sticky;top:0;z-index:20;background:rgba(248,250,252,.92);backdrop-filter:blur(8px);border-bottom:1px solid #e5e7eb;margin:0 -14px 12px;padding:12px 14px}
h1{margin:0 0 8px;font-size:1.15rem} .sub{font-size:.88rem;color:var(--muted);margin-bottom:10px} .controls,.segment,.row{display:grid;gap:8px;grid-template-columns:1fr 1fr} .full{grid-column:1/-1}
input,select,button{width:100%;border-radius:14px;border:1px solid #cbd5e1;padding:12px 14px;font-size:16px;background:#fff} button{font-weight:700} .primary{background:var(--accent);color:#fff;border-color:var(--accent)} .secondary{background:#fff}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0} .stat{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:10px;text-align:center} .stat b{display:block;font-size:1.15rem}
.card{margin-top:10px;perspective:1000px;height:280px} .inner{position:relative;width:100%;height:100%;transition:transform .45s ease;transform-style:preserve-3d} .card.flipped .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;box-shadow:0 12px 30px rgba(15,23,42,.08);border:1px solid #e5e7eb}
.front{background:#fff} .back{background:#111827;color:#fff;transform:rotateY(180deg)} .cat{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px} .front .main{font-size:1.6rem;font-weight:800;line-height:1.2} .back .main{font-size:3rem;font-weight:900;letter-spacing:.08em} .hint{position:absolute;bottom:14px;font-size:.85rem;opacity:.65}
.quiz{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:14px;margin-top:12px} .hidden{display:none!important} .choices{display:grid;gap:8px;margin-top:12px} .choice{text-align:left} .choice.good{background:#dcfce7;border-color:#86efac} .choice.bad{background:#fee2e2;border-color:#fca5a5} .msg{margin-top:10px;font-weight:700}
.footerbar{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid #e5e7eb;padding:10px 12px calc(10px + env(safe-area-inset-bottom))} .footergrid{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px} .small{font-size:.82rem;color:var(--muted)} .note{margin-top:12px;color:var(--muted);font-size:.88rem;text-align:center}
</style></head><body>
<div class='wrap'><div class='top'><h1>Canada Codes Flashcards</h1><div class='sub'>Province and territory study mode</div>
<div class='controls'><input id='search' class='full' placeholder='Search city or code'><select id='category' class='full'></select>
<div class='segment full'><button id='modeFlash' class='secondary'>Flashcards</button><button id='modeQuiz' class='secondary'>Quiz</button></div>
<div class='segment full'><button id='dirCity' class='secondary'>City → Code</button><button id='dirCode' class='secondary'>Code → City</button></div></div></div>
<div class='stats'><div class='stat'><span class='small'>Cards</span><b id='countCards'>0</b></div><div class='stat'><span class='small'>Correct</span><b id='countCorrect'>0</b></div><div class='stat'><span class='small'>Wrong</span><b id='countWrong'>0</b></div></div>
<div id='flashView'><div class='card' id='cardWrap'><div class='inner'><div class='face front'><div class='cat' id='frontCat'></div><div class='main' id='frontMain'></div><div class='hint'>Tap to flip</div></div><div class='face back'><div class='cat' id='backCat'></div><div class='main' id='backMain'></div><div class='hint'>Tap to flip back</div></div></div></div><div class='row' style='margin-top:12px'><button id='prevBtn' class='secondary'>Previous</button><button id='nextBtn' class='primary'>Next</button></div></div>
<div id='quizView' class='hidden'><div class='quiz'><div class='small' id='quizCat'></div><div style='font-size:1.45rem;font-weight:800;line-height:1.25;margin-top:6px' id='quizQuestion'></div><div class='choices' id='quizChoices'></div><div class='msg' id='quizMsg'></div><div class='row' style='margin-top:12px'><button id='quizSkip' class='secondary'>Skip</button><button id='quizNext' class='primary'>Next Question</button></div></div></div>
<div class='note'>Progress saves automatically on this device.</div></div>
<div class='footerbar'><div class='footergrid'><button id='shuffleBtn' class='secondary'>Shuffle</button><button id='wrongOnlyBtn' class='secondary'>Wrong Only</button><button id='resetBtn' class='secondary'>Reset</button></div></div>
<script>
const allCards = [{"front": "Abbotsford", "back": "YXX", "category": "British Columbia (BC)"}, {"front": "Nanaimo", "back": "YCD", "category": "British Columbia (BC)"}, {"front": "Campbell River", "back": "YBL", "category": "British Columbia (BC)"}, {"front": "Castlegar", "back": "YCG", "category": "British Columbia (BC)"}, {"front": "Comox", "back": "YQQ", "category": "British Columbia (BC)"}, {"front": "Cranbrook", "back": "YXC", "category": "British Columbia (BC)"}, {"front": "Kamloops", "back": "YKA", "category": "British Columbia (BC)"}, {"front": "Kelowna", "back": "YLW", "category": "British Columbia (BC)"}, {"front": "Penticton", "back": "YYF", "category": "British Columbia (BC)"}, {"front": "Prince George", "back": "YXS", "category": "British Columbia (BC)"}, {"front": "Prince Rupert", "back": "YPR", "category": "British Columbia (BC)"}, {"front": "Vancouver", "back": "YVR", "category": "British Columbia (BC)"}, {"front": "Victoria", "back": "YYJ", "category": "British Columbia (BC)"}, {"front": "Calgary", "back": "YYC", "category": "Alberta (AB)"}, {"front": "Edmonton International", "back": "YEG", "category": "Alberta (AB)"}, {"front": "Fort McMurray", "back": "YMM", "category": "Alberta (AB)"}, {"front": "Grande Prairie", "back": "YQU", "category": "Alberta (AB)"}, {"front": "Lethbridge", "back": "YQL", "category": "Alberta (AB)"}, {"front": "Medicine Hat", "back": "YXH", "category": "Alberta (AB)"}, {"front": "Regina", "back": "YQR", "category": "Saskatchewan (SK)"}, {"front": "Saskatoon", "back": "YXE", "category": "Saskatchewan (SK)"}, {"front": "Winnipeg", "back": "YWG", "category": "Manitoba (MB)"}, {"front": "North Bay", "back": "YYB", "category": "Ontario (ON)"}, {"front": "Ottawa", "back": "YOW", "category": "Ontario (ON)"}, {"front": "Sarnia", "back": "YZR", "category": "Ontario (ON)"}, {"front": "Sault Ste. Marie", "back": "YAM", "category": "Ontario (ON)"}, {"front": "Sudbury", "back": "YSB", "category": "Ontario (ON)"}, {"front": "Thunder Bay", "back": "YQT", "category": "Ontario (ON)"}, {"front": "Timmins", "back": "YTS", "category": "Ontario (ON)"}, {"front": "Toronto Pearson", "back": "YYZ", "category": "Ontario (ON)"}, {"front": "Toronto City Centre", "back": "YTZ", "category": "Ontario (ON)"}, {"front": "Kingston", "back": "YGK", "category": "Ontario (ON)"}, {"front": "London", "back": "YXU", "category": "Ontario (ON)"}, {"front": "Windsor", "back": "YQG", "category": "Ontario (ON)"}, {"front": "Montréal Dorval", "back": "YUL", "category": "Quebec (QC)"}, {"front": "Bagotville / Saguenay", "back": "YBG", "category": "Quebec (QC)"}, {"front": "Quebec City", "back": "YQB", "category": "Quebec (QC)"}, {"front": "Rouyn-Noranda", "back": "YUY", "category": "Quebec (QC)"}, {"front": "Gaspé", "back": "YGP", "category": "Quebec (QC)"}, {"front": "Sept-Îles", "back": "YZV", "category": "Quebec (QC)"}, {"front": "Val d'Or", "back": "YVO", "category": "Quebec (QC)"}, {"front": "Bathurst", "back": "ZBF", "category": "New Brunswick (NB)"}, {"front": "Saint John", "back": "YSJ", "category": "New Brunswick (NB)"}, {"front": "Fredericton", "back": "YFC", "category": "New Brunswick (NB)"}, {"front": "Moncton", "back": "YQM", "category": "New Brunswick (NB)"}, {"front": "Halifax", "back": "YHZ", "category": "Nova Scotia (NS)"}, {"front": "Sydney", "back": "YQY", "category": "Nova Scotia (NS)"}, {"front": "Charlottetown", "back": "YYG", "category": "Prince Edward Island (PE)"}, {"front": "Deer Lake", "back": "YDF", "category": "Newfoundland and Labrador (NL)"}, {"front": "Goose Bay", "back": "YYR", "category": "Newfoundland and Labrador (NL)"}, {"front": "St. John's", "back": "YYT", "category": "Newfoundland and Labrador (NL)"}, {"front": "Wabush", "back": "YWK", "category": "Newfoundland and Labrador (NL)"}, {"front": "Gander", "back": "YQX", "category": "Newfoundland and Labrador (NL)"}, {"front": "Whitehorse", "back": "YXY", "category": "Yukon (YT)"}, {"front": "Inuvik", "back": "YEV", "category": "Northwest Territories (NT)"}, {"front": "Yellowknife", "back": "YZF", "category": "Northwest Territories (NT)"}, {"front": "Iqaluit / Frobisher Bay", "back": "YFB", "category": "Nunavut (NU)"}, {"front": "Rankin Inlet", "back": "YRT", "category": "Nunavut (NU)"}];
const categories = ["All", ...Array.from(new Set(allCards.map(c => c.category)))];
const state = {
  mode: localStorage.getItem("ca_mode") || "flash",
  direction: localStorage.getItem("ca_dir") || "cityToCode",
  category: localStorage.getItem("ca_category") || "All",
  search: localStorage.getItem("ca_search") || "",
  index: Number(localStorage.getItem("ca_index") || 0),
  flipped: false,
  wrongOnly: localStorage.getItem("ca_wrongOnly") === "1",
  correct: Number(localStorage.getItem("ca_correct") || 0),
  wrong: Number(localStorage.getItem("ca_wrong") || 0),
  wrongSet: JSON.parse(localStorage.getItem("ca_wrongSet") || "[]")
};
let filtered = [], quizAnswer = null;
const el = id => document.getElementById(id);
function save(){localStorage.setItem("ca_mode",state.mode);localStorage.setItem("ca_dir",state.direction);localStorage.setItem("ca_category",state.category);localStorage.setItem("ca_search",state.search);localStorage.setItem("ca_index",state.index);localStorage.setItem("ca_wrongOnly",state.wrongOnly?"1":"0");localStorage.setItem("ca_correct",state.correct);localStorage.setItem("ca_wrong",state.wrong);localStorage.setItem("ca_wrongSet",JSON.stringify(state.wrongSet));}
function keyFor(c){return c.front+"|"+c.back+"|"+c.category;}
function applyFilters(){const q=state.search.trim().toLowerCase();filtered=allCards.filter(c=>(state.category==="All"||c.category===state.category)&&(!q||(c.front+" "+c.back+" "+c.category).toLowerCase().includes(q))&&(!state.wrongOnly||state.wrongSet.includes(keyFor(c))));if(!filtered.length||state.index>=filtered.length)state.index=0;save();render();}
function sides(card){if(!card)return{front:"No cards found",back:"Try another filter",cat:""};return state.direction==="cityToCode"?{front:card.front,back:card.back,cat:card.category}:{front:card.back,back:card.front,cat:card.category};}
function renderCats(){const sel=el("category");sel.innerHTML=categories.map(c=>`<option value="${c}">${c}</option>`).join("");sel.value=state.category;}
function renderButtons(){el("modeFlash").className=state.mode==="flash"?"primary":"secondary";el("modeQuiz").className=state.mode==="quiz"?"primary":"secondary";el("dirCity").className=state.direction==="cityToCode"?"primary":"secondary";el("dirCode").className=state.direction==="codeToCity"?"primary":"secondary";el("wrongOnlyBtn").className=state.wrongOnly?"primary":"secondary";}
function render(){renderButtons();renderCats();el("countCards").textContent=filtered.length;el("countCorrect").textContent=state.correct;el("countWrong").textContent=state.wrong;el("flashView").classList.toggle("hidden",state.mode!=="flash");el("quizView").classList.toggle("hidden",state.mode!=="quiz");if(state.mode==="flash"){const d=sides(filtered[state.index]);el("frontCat").textContent=d.cat;el("backCat").textContent=d.cat;el("frontMain").textContent=d.front;el("backMain").textContent=d.back;el("cardWrap").classList.toggle("flipped",!!state.flipped);}else renderQuiz();}
function nextCard(){if(filtered.length){state.index=(state.index+1)%filtered.length;state.flipped=false;save();render();}}
function prevCard(){if(filtered.length){state.index=(state.index-1+filtered.length)%filtered.length;state.flipped=false;save();render();}}
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function shuffleFiltered(){shuffleArray(filtered);state.index=0;state.flipped=false;save();render();}
function markWrong(card){const k=keyFor(card);if(!state.wrongSet.includes(k))state.wrongSet.push(k);state.wrong+=1;save();}
function clearWrong(card){const k=keyFor(card);state.wrongSet=state.wrongSet.filter(x=>x!==k);save();}
function renderQuiz(){const card=filtered[state.index];if(!card){el("quizCat").textContent="";el("quizQuestion").textContent="No cards found";el("quizChoices").innerHTML="";el("quizMsg").textContent="";return;}const correct=state.direction==="cityToCode"?card.back:card.front;const question=state.direction==="cityToCode"?card.front:card.back;el("quizCat").textContent=card.category;el("quizQuestion").textContent=question;el("quizMsg").textContent="";quizAnswer=correct;const pool=allCards.filter(c=>c.category===card.category&&keyFor(c)!==keyFor(card));shuffleArray(pool);const wrongChoices=pool.slice(0,3).map(c=>state.direction==="cityToCode"?c.back:c.front);const options=[correct,...wrongChoices];shuffleArray(options);const holder=el("quizChoices");holder.innerHTML="";options.forEach(opt=>{const b=document.createElement("button");b.className="choice secondary";b.textContent=opt;b.onclick=()=>answerQuiz(b,opt);holder.appendChild(b);});}
function answerQuiz(btn,opt){const card=filtered[state.index];const buttons=[...document.querySelectorAll('#quizChoices .choice')];buttons.forEach(b=>b.disabled=true);if(opt===quizAnswer){btn.classList.add('good');el("quizMsg").textContent="Correct";state.correct+=1;clearWrong(card);}else{btn.classList.add('bad');const goodBtn=buttons.find(b=>b.textContent===quizAnswer);if(goodBtn)goodBtn.classList.add('good');el("quizMsg").textContent="Wrong";markWrong(card);}save();el("countCorrect").textContent=state.correct;el("countWrong").textContent=state.wrong;}
el("search").value=state.search;el("search").addEventListener("input",e=>{state.search=e.target.value;state.index=0;save();applyFilters();});el("category").addEventListener("change",e=>{state.category=e.target.value;state.index=0;save();applyFilters();});
el("modeFlash").onclick=()=>{state.mode="flash";save();render();};el("modeQuiz").onclick=()=>{state.mode="quiz";save();render();};el("dirCity").onclick=()=>{state.direction="cityToCode";state.flipped=false;save();render();};el("dirCode").onclick=()=>{state.direction="codeToCity";state.flipped=false;save();render();};el("prevBtn").onclick=prevCard;el("nextBtn").onclick=nextCard;el("shuffleBtn").onclick=shuffleFiltered;el("wrongOnlyBtn").onclick=()=>{state.wrongOnly=!state.wrongOnly;state.index=0;save();applyFilters();};el("resetBtn").onclick=()=>{["ca_mode","ca_dir","ca_category","ca_search","ca_index","ca_wrongOnly","ca_correct","ca_wrong","ca_wrongSet"].forEach(k=>localStorage.removeItem(k));location.reload();};el("quizSkip").onclick=nextCard;el("quizNext").onclick=nextCard;el("cardWrap").onclick=()=>{if(filtered.length){state.flipped=!state.flipped;save();render();}};
renderCats();applyFilters();
</script></body></html>
